services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - APP_CHAT_MODEL=${APP_CHAT_MODEL}
      - APP_EMBEDDING_MODEL=${APP_EMBEDDING_MODEL}
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    entrypoint: []
    command:
      [
        "sh",
        "-c",
        "ollama serve & sleep 5 && (ollama pull ${APP_CHAT_MODEL} || echo 'Failed to pull chat model') && (ollama pull ${APP_EMBEDDING_MODEL} || echo 'Failed to pull embedding model') && wait",
      ]
    restart: no
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capstone-project-backend
    ports:
      - "8000:8000"
    environment:
      - APP_PG_HOST=db
      - APP_PG_PORT=5432
      - APP_PG_USER=${APP_PG_USER}
      - APP_PG_PASSWORD=${APP_PG_PASSWORD}
      - APP_PG_DATABASE=${APP_PG_DATABASE}
      - APP_OLLAMA_BASE_URL=${APP_OLLAMA_BASE_URL}
      - APP_CHAT_MODEL=${APP_CHAT_MODEL}
      - APP_EMBEDDING_MODEL=${APP_EMBEDDING_MODEL}
    depends_on:
      - ollama
    volumes:
      - ./logs:/app/logs
    networks:
      - app-network
    restart: unless-stopped

volumes:
  ollama_data:

networks:
  app-network:
    driver: bridge