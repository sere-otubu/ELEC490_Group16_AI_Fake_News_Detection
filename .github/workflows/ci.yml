name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

jobs:
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            src/requirements.txt
            src/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r src/requirements.txt -r src/requirements-dev.txt

      - name: Run unit tests
        env:
          APP_PG_HOST: localhost
          APP_PG_PORT: "5432"
          APP_PG_USER: test
          APP_PG_PASSWORD: test
          APP_PG_DATABASE: test_db
          APP_OPENROUTER_API_KEY: test-key
        run: python -m pytest tests/unit/ -v --tb=short

  frontend-lint:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Lint
        run: cd frontend && pnpm lint

      - name: Build (type-check + bundle)
        run: cd frontend && pnpm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t medcheck-test .

  # ============================================
  # Summary Job - Ensures all checks pass
  # ============================================
  ci-success:
    name: Continous Integration Success
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint, docker-build]
    if: always()
    
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          if [ "${{ needs.frontend-lint.result }}" != "success" ]; then
            echo "❌ Frontend linting failed"
            exit 1
          fi
          if [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "❌ Docker build failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"

      # 8. Send Discord Notification on Success
      - name: Send Discord Notification on Success
        if: success() # Only runs if all previous steps passed
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_SECRET }}
          username: "GitHub Actions"
          avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          color: "#48f442" # Green
          message: |
            ✅ **Backend Continuous Integration (CI) Succeeded** on `${{ github.ref_name }}`
            **Committer:** ${{ github.actor }}
            See run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # 9. Send Discord Notification on Failure
      - name: Send Discord Notification on Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_SECRET }}
          DISCORD_ID: ${{ 
            github.actor == 'sere-otubu' && secrets.DISCORD_ID_SERE ||
            github.actor == 'ivansamardzic' && secrets.DISCORD_ID_IVAN ||
            github.actor == 'Mihran03' && secrets.DISCORD_ID_MIHRAN ||
            '' }}
        run: |
          if [ -n "$DISCORD_ID" ]; then
            MENTION="<@$DISCORD_ID>"
          else
            MENTION=""
          fi
          
          curl -H "Content-Type: application/json" -X POST -d "{
            \"username\": \"GitHub Actions\",
            \"avatar_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\",
            \"content\": \"$MENTION\",
            \"embeds\": [{
              \"title\": \"❌ Backend Continuous Integration (CI) Failed\",
              \"description\": \"**Branch:** \`${{ github.ref_name }}\`\n**Committer:** ${{ github.actor }}\n\nPlease check the build logs for more details.\",
              \"color\": 16711680,
              \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }],
            \"allowed_mentions\": {
              \"parse\": [\"users\"]
            }
          }" "$DISCORD_WEBHOOK_URL"

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [ci-success]
    if: github.event_name == 'pull_request' && github.ref == 'refs/heads/main' && needs.ci-success.result == 'success'
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "❌ Missing VERCEL_DEPLOY_HOOK_URL secret"
            exit 1
          fi
          curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK_URL"

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [ci-success]
    if: github.event_name == 'pull_request' && github.ref == 'refs/heads/main' && needs.ci-success.result == 'success'
    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "❌ Missing RENDER_DEPLOY_HOOK_URL secret"
            exit 1
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
