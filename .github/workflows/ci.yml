name: "Validate Training Scripts & API"

on:
  push:
    branches:
      - fine-tuning
  pull_request:
    branches:
      - fine-tuning

jobs:
  lint-and-test-logins:
    name: "Lint, Install & Test Hub Login"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' 
          cache-dependency-path: fine_tuning/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fine_tuning/requirements.txt
          pip install ruff 
      
      - name: Login to Hugging Face Hub
        run: |
          pip install huggingface_hub
          # 1. This is the new command to set up the credential helper
          git config --global credential.helper store
          
          # 2. This command can now successfully save the token for git
          hf auth login --token ${{ secrets.HF_TOKEN }} --add-to-git-credential

      - name: Login to Weights & Biases
        run: |
          pip install wandb
          wandb login ${{ secrets.WANDB_API_KEY }}
      
      - name: Run linter
        run: ruff check fine_tuning/

  build-docker-image:
    name: "Build Docker Image (API)"
    runs-on: ubuntu-latest
    # This ensures the Docker build only runs if linting passes
    needs: lint-and-test-logins

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./model_api  # Path to your Dockerfile's directory
          push: false           # We are only TESTING the build
          load: false           # We don't need to load the image
