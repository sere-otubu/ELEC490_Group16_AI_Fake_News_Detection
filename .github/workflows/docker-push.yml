# .github/workflows/docker-push.yml

# Name of your workflow
name: Build and Push Backend to Docker Hub

# Controls when the action will run
on:
  # Triggers the workflow on push events to your specific branch
  push:
    branches: [ 'sere-dev' ]

# A workflow run is made up of one or more jobs that can run in parallel
jobs:
  # This job is named "build-and-push"
  build-and-push:
    # The type of runner the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed
    steps:
      # Step 1: Check out your repository's code
      - name: Check out code
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build and push the Docker image
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend  # Tells it to find the Dockerfile in your 'backend' folder
          push: true          # Tells it to push to Docker Hub
          tags: sereotubu101/medical-fact-checker:latest # The full name of your image